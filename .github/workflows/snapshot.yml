name: Daily snapshot

# Builds the EOD snapshot off-Worker (full Node, no subrequest/CPU limits) and
# POSTs it to the Worker's ingest endpoint. Runs at the same off-peak time the
# Worker cron used (best Yahoo-success window). The Worker cron remains as a
# fallback. See REDESIGN_BLUEPRINT §15 / DESIGN_SYSTEM is unrelated.
on:
  schedule:
    - cron: '30 21 * * 1-5'   # 21:30 UTC Mon–Fri (90 min after US close)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  build-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build snapshot and ingest
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          INGEST_URL: ${{ secrets.INGEST_URL }}       # optional; defaults to prod worker URL
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # optional; skips liquidity note if absent
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}  # optional; skips news-density if absent
        run: node --import tsx scripts/build-snapshot.ts

  notify-on-failure:
    name: Notify snapshot failure
    needs: build-and-ingest
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update snapshot failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily snapshot workflow failure'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              'The `snapshot.yml` workflow failed.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Job: build-and-ingest`,
              `- Branch: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
            ].join('\n')

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            })

            const existing = issues.find((issue) => issue.title === title)

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
              core.notice(`Updated existing issue #${existing.number}`)
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ops', 'snapshot'],
              })
              core.notice(`Created issue #${issue.number}`)
            }
